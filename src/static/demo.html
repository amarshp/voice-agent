<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0b141a"/>
<title>California Burrito</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
    color:#fff;overflow:hidden;
    background:linear-gradient(180deg,#243b4a 0%,#16232c 55%,#0b141a 100%);}
  .screen{height:100dvh;display:flex;flex-direction:column;align-items:center;
    padding:env(safe-area-inset-top) 24px calc(env(safe-area-inset-bottom) + 28px);}
  .top{margin-top:12vh;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px}
  .avatar{width:112px;height:112px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:52px;background:rgba(255,255,255,.14);backdrop-filter:blur(8px);
    box-shadow:0 8px 30px rgba(0,0,0,.35)}
  .name{font-size:34px;font-weight:600;letter-spacing:.2px}
  .status{font-size:17px;color:#c7d0d6;min-height:22px;font-variant-numeric:tabular-nums}
  .hint{position:absolute;bottom:calc(env(safe-area-inset-bottom) + 132px);left:0;right:0;text-align:center;
    font-size:12.5px;color:#8b97a0;padding:0 30px}
  .controls{margin-top:auto;display:flex;gap:64px;align-items:center;justify-content:center}
  .btn{width:76px;height:76px;border-radius:50%;border:0;cursor:pointer;display:flex;
    align-items:center;justify-content:center;color:#fff;transition:transform .08s,opacity .2s}
  .btn:active{transform:scale(.92)}
  .btn svg{width:34px;height:34px;fill:#fff}
  .call{background:#34c759;box-shadow:0 6px 22px rgba(52,199,89,.5)}
  .end{background:#ff3b30;box-shadow:0 6px 22px rgba(255,59,48,.5)}
  .end svg{transform:rotate(135deg)}
  .mute{width:64px;height:64px;background:rgba(255,255,255,.16)}
  .mute.on{background:#fff}.mute.on svg{fill:#16232c}
  .label{font-size:12px;color:#c7d0d6;margin-top:9px;text-align:center}
  .ctl{display:flex;flex-direction:column;align-items:center}
  .hidden{display:none!important}
</style>
</head>
<body>
<div class="screen">
  <div class="top">
    <div class="avatar">🌯</div>
    <div class="name">California Burrito</div>
    <div class="status" id="status">tap to call</div>
  </div>

  <div class="hint" id="hint">🎧 Use headphones for the best experience</div>

  <div class="controls">
    <div class="ctl" id="muteWrap" style="visibility:hidden">
      <button class="btn mute" id="mute" aria-label="mute">
        <svg viewBox="0 0 24 24"><path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V22h2v-3.08A7 7 0 0 0 19 12h-2z"/></svg>
      </button><div class="label">mute</div>
    </div>
    <div class="ctl">
      <button class="btn call" id="callBtn" aria-label="call">
        <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.6.1.4 0 .8-.3 1l-2.2 2.2z"/></svg>
      </button><div class="label" id="callLabel">call</div>
    </div>
  </div>
</div>

<script>
const WS_BASE = "ws://localhost:5001";       // baked at deploy time
const AGENT   = "AGENT_ID_PLACEHOLDER";      // baked at deploy time

// ---- G.711 mu-law ----
function linToMu(s){const B=0x84,C=32635;let sign=(s>>8)&0x80;if(sign)s=-s;if(s>C)s=C;s+=B;
  let e=7;for(let m=0x4000;(s&m)===0&&e>0;e--,m>>=1){}let man=(s>>(e+3))&0x0f;return(~(sign|(e<<4)|man))&0xff;}
function muToLin(u){u=~u&0xff;let sign=u&0x80,e=(u>>4)&7,man=u&0x0f;let s=((man<<3)+0x84)<<e;s-=0x84;return sign?-s:s;}

const $=id=>document.getElementById(id);
let ws,ac,micNode,micStream,playTime=0,connected=false,inCall=false,muted=false,secs=0,timer=null;

function setStatus(t){$('status').textContent=t;}
function fmt(s){return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}

async function call(){
  inCall=true;
  $('callBtn').classList.replace('call','end');
  $('callLabel').textContent='end';
  $('muteWrap').style.visibility='visible';
  $('hint').classList.add('hidden');
  setStatus('calling…');
  try{
    ac=new AudioContext({sampleRate:8000});
    micStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,channelCount:1,sampleRate:8000}});
  }catch(e){ setStatus('microphone blocked'); reset(); return; }

  ws=new WebSocket(WS_BASE+'/chat/v1/'+AGENT);
  ws.onopen=()=>{ connected=true; startTimer();
    ws.send(JSON.stringify({event:'connected',protocol:'Call',version:'1.0.0'}));
    ws.send(JSON.stringify({event:'start',streamSid:'WEB',start:{streamSid:'WEB',callSid:'WEBCALL',tracks:['inbound'],mediaFormat:{encoding:'audio/x-mulaw',sampleRate:8000,channels:1}}}));
    startMic();
  };
  ws.onmessage=ev=>{ let d;try{d=JSON.parse(ev.data);}catch{return;}
    if(d.event==='media') playChunk(d.media.payload);
    else if(d.event==='mark') ws.send(JSON.stringify({event:'mark',streamSid:'WEB',mark:{name:d.mark.name}}));
    else if(d.event==='clear') playTime=ac.currentTime; };
  ws.onclose=()=>{ if(inCall){ setStatus('call ended'); reset(); } };
  ws.onerror=()=>{ setStatus('connection error'); };
}

function startTimer(){ secs=0; setStatus('0:00'); timer=setInterval(()=>{ if(!muted) secs++; setStatus((muted?'muted · ':'')+fmt(secs)); },1000); }

let ts=0,buf=[];
function startMic(){
  const src=ac.createMediaStreamSource(micStream);
  micNode=ac.createScriptProcessor(1024,1,1); src.connect(micNode);
  const sink=ac.createGain(); sink.gain.value=0; micNode.connect(sink); sink.connect(ac.destination);
  micNode.onaudioprocess=e=>{
    if(!connected||muted) return;
    const f=e.inputBuffer.getChannelData(0);
    for(let i=0;i<f.length;i++){let s=Math.max(-1,Math.min(1,f[i]))*32767;buf.push(linToMu(s));}
    while(buf.length>=160){const fr=buf.splice(0,160);let bin='';for(let i=0;i<160;i++)bin+=String.fromCharCode(fr[i]);
      ws.send(JSON.stringify({event:'media',streamSid:'WEB',media:{track:'inbound',chunk:String(ts/20),timestamp:String(ts),payload:btoa(bin)}}));ts+=20;}
  };
}
function playChunk(b64){ const bin=atob(b64),pcm=new Float32Array(bin.length);
  for(let i=0;i<bin.length;i++)pcm[i]=muToLin(bin.charCodeAt(i))/32768;
  const ab=ac.createBuffer(1,pcm.length,8000);ab.getChannelData(0).set(pcm);
  const n=ac.createBufferSource();n.buffer=ab;n.connect(ac.destination);
  const now=ac.currentTime;if(playTime<now)playTime=now+0.02;n.start(playTime);playTime+=ab.duration; }

function reset(){ inCall=false;connected=false;clearInterval(timer);
  try{micNode&&micNode.disconnect();}catch{} try{micStream&&micStream.getTracks().forEach(t=>t.stop());}catch{} try{ac&&ac.close();}catch{}
  $('callBtn').classList.replace('end','call'); $('callLabel').textContent='call';
  $('muteWrap').style.visibility='hidden'; $('mute').classList.remove('on'); muted=false;
  setTimeout(()=>{ if(!inCall){ setStatus('tap to call'); $('hint').classList.remove('hidden'); } },1400); }
function hang(){ try{ws&&ws.close();}catch{} setStatus('call ended'); reset(); }

$('callBtn').onclick=()=>{ inCall? hang() : call(); };
$('mute').onclick=()=>{ muted=!muted; $('mute').classList.toggle('on',muted); };
</script>
</body>
</html>
